[allowlist]
  description = "Allowlist for known safe patterns"
  paths = [
    '''\.env\.example$''',
    '''terraform\.tfvars\.example$''',
    '''(^|/)tests?/''',
    '''(^|/)__tests__/''',
    '''.*\.sample$'''
  ]
  regexes = [
    '''AWS_ACCESS_KEY_ID=test$''',
    '''AWS_SECRET_ACCESS_KEY=test$''',
    '''local-dev-secret-change-me'''
  ]
